# Deploy to S3 when content is merged to main.
name: Deploy to S3

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'content/**'
      - 'app/**'
      - 'public/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'app/package.json'
      - 'app/package-lock.json'
      - '.github/workflows/deploy.yml'
      - '.github/scripts/validate.sh'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install and build
        run: |
          npm ci
          cd app && npm ci && cd ..
          npm run build

      - name: Validate
        run: |
          test -f dist/index.html
          test -f dist/feed-code.xml
          test -f dist/feed-recipes.xml
          test -f dist/feed-all.xml
          test -f dist/sitemap.xml
          test -f dist/index.json
          test -f dist/eatcodewrite.css
          grep -q -- '--ecw-code' dist/eatcodewrite.css || (echo "dist/eatcodewrite.css must define theme variables (--ecw-code, --ecw-eat); edit app/public/eatcodewrite.css" && exit 1)
      - name: System tests
        run: npm run test:system

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Generate missing summaries (Bedrock)
        run: |
          npm ci
          node scripts/summarize.js || true

      - name: Persist new summaries
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/
          git diff --staged --quiet || (git commit -m "Add LLM-generated entry summaries" && git push)

      - name: Build
        run: |
          npm ci
          cd app && npm ci && cd ..
          npm run build

      - name: Sync to S3
        run: |
          aws s3 sync dist/ "s3://${{ secrets.S3_BUCKET }}/" \
            --delete \
            --cache-control "public, max-age=3600"
          # Shorter cache for list data so updates appear without waiting for full invalidation
          aws s3 cp "s3://${{ secrets.S3_BUCKET }}/entries.json" "s3://${{ secrets.S3_BUCKET }}/entries.json" \
            --metadata-directive REPLACE --cache-control "public, max-age=60" \
            --content-type "application/json"

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID="${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"
          INV=$(aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*" --query 'Invalidation.Id' --output text)
          echo "Invalidation ID: $INV"
          for i in $(seq 1 30); do
            STATUS=$(aws cloudfront get-invalidation --distribution-id "$DIST_ID" --id "$INV" --query 'Invalidation.Status' --output text)
            echo "Invalidation status: $STATUS"
            [ "$STATUS" = "Completed" ] && break
            sleep 10
          done
          [ "$STATUS" = "Completed" ] || (echo "Invalidation did not complete in time" && exit 1)
